<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=K2D&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

  <title>Chore Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #d5eecf">
  <div class="container text-center intro">
    <h1>Welcome to Chore Manager!</h1>
    <p>Create groups to delegate chores and organize household tasks</p>

    <div class="row justify-content-center mt-5">

      <!-- Login Form -->
      <div class="col-md-3">
        <form id="loginForm">
          <h2>Login</h2>
          <input type="text" id="loginName" placeholder="Name" required><br>
          <input type="password" id="loginPassword" placeholder="Password" required><br><br>
          <button type="submit">Login</button>
        </form>
      </div>

      <div class="col-md-1 d-flex align-items-center justify-content-center">
        <h3>OR</h3>
      </div>

      <!-- Create Account Form -->
      <div class="col-md-3">
        <form id="createForm">
          <h2>Create Account</h2>
          <input type="text" id="createName" placeholder="Name" required><br>
          <input type="password" id="createPassword" placeholder="Password" required><br><br>
          <button type="submit">Create</button>
        </form>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const loginForm = document.getElementById('loginForm');
      const createForm = document.getElementById('createForm');

      function getAccounts() {
        return JSON.parse(localStorage.getItem('accounts')) || [];
      }

      function saveAccounts(accounts) {
        localStorage.setItem('accounts', JSON.stringify(accounts));
      }

      // Handle account creation
      createForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const name = document.getElementById('createName').value.trim();
        const password = document.getElementById('createPassword').value;

        if (!name || !password) {
          alert("Please enter both name and password.");
          return;
        }

        let accounts = getAccounts();
        if (accounts.some(acc => acc.name === name)) {
          alert("Account with this name already exists.");
          return;
        }

        accounts.push({ name, password });
        saveAccounts(accounts);

        // Automatically log in after creating account
        localStorage.setItem('currentUser', JSON.stringify({ name }));
        window.location.href = "homepage.html";
      });

      // Handle login
      loginForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const name = document.getElementById('loginName').value.trim();
        const password = document.getElementById('loginPassword').value;

        let accounts = getAccounts();
        const account = accounts.find(acc => acc.name === name && acc.password === password);

        if (account) {
          localStorage.setItem('currentUser', JSON.stringify({ name }));
          window.location.href = "homepage.html";
        } else {
          alert("Incorrect name or password.");
        }
      });

    });
  </script>
</body>
</html>
