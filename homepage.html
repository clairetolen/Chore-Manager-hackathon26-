<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=K2D&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

  <title>Homepage</title>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container-fluid">
      <p class="navbar-brand">Chore Manager</p>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <!-- Add Chore Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle btn px-3" href="#" id="choreDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Add Chore
            </a>
            <div class="dropdown-menu p-3" aria-labelledby="choreDropdown" style="min-width: 250px; max-width: 90vw;">
              <form id="navbarChoreForm" class="d-flex flex-wrap">
                <input type="text" id="navbarChoreInput" class="form-control form-control-lg me-2 mb-2" placeholder="New Chore" required>
                <button class="btn addbtn btn-primary btn-lg w-100 w-md-auto" type="submit">Add</button>
              </form>
            </div>
          </li>

          <!-- Create Group Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle btn px-3" href="#" id="personDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Create / Join Group
            </a>
            <div class="dropdown-menu p-3" aria-labelledby="personDropdown" style="min-width: 250px; max-width: 90vw;">
              <form id="groupForm" class="d-flex flex-wrap">
                <input type="text" id="groupInput" class="form-control form-control-lg me-2 mb-2" placeholder="Group Name" required>
                <button class="btn addbtn btn-primary btn-lg w-100 w-md-auto" type="submit">Create / Join</button>
              </form>
            </div>
          </li>

          <li class="nav-item"><a class="nav-link btn px-3" href="index.html">Log out</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 pt-5">
    <h1><strong>Hey, <span id="username"></span>!</strong></h1>
    <h2>Your tasks this week:</h2>
    <hr>
    <ul id="choreList" class="list-group mb-3"></ul>
  </div>

  <script src="homepage.js"></script>
</body>
</html>
